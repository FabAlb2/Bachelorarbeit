<!doctype html>
<html lang="de">
<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gesundheitsangebote</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="style.css" />



</head>
<body>

 
    <header id="anzeige" class="header">
      Gesundheits- und Pflegeangebote
    </header>

    <section class="controls">

    <div class="filter-section">
      <input id="suchfeld" class="search-input" placeholder="Nach Einrichtung suchen..." />

      <div class="checkbox">
       <label><input type="checkbox" id="checkBarriere"/>Nur Barrierefrei</label>
      </div>

  <!-- Facility-Typen -->
      <div class="checkbox" id="facilityTypes">
        <label><input type="checkbox" id="checkDoctors"/> Ärzte</label>
        <label><input type="checkbox" class="facilityType" value="KRANKENHAUS"> Krankenhaus</label>
        <label><input type="checkbox" class="facilityType" value="APOTHEKE"> Apotheke</label>
        <label><input type="checkbox" class="facilityType" value="KURZZEITPFLEGEHEIM"> Kurzzeitpflegeheim</label>
        <label><input type="checkbox" class="facilityType" value="AMBULANTER_PFLEGEDIENST"> Ambulanter Pflegedienst</label>
        <label><input type="checkbox" class="facilityType" value="PFLEGEHEIM"> (Platzhalter)</label>
      </div>


      <!-- Auswahlfeld Staatsangehörigkeit -->
      <div class="population-bar">
        <div class="panel-wrap">
          <details class="panel" id="popPanel">
          <summary class="panel-summary">Staatsangehörigkeit</summary>

            <div class="panel-popup">
              <div class="panel-body">
                <div class="field">
                  <label for="popStichtag">Stichtag:</label>
                  <select id="popStichtag">
                    <option value="">Datum auswählen</option>
                  </select>
                </div>

                <div class="field hidden" id="statusAuswahlBevoelkerung">
                  <span>Staatsangehörigkeit:</span>

                  <label><input type="radio" name="bevoelkerungStatus" value="deutsch"> Deutsch</label>
                  <label><input type="radio" name="bevoelkerungStatus" value="deutschMit2Sta"> Deutsch mit 2. Staatsbürgerschaft</label>
                  <label><input type="radio" name="bevoelkerungStatus" value="nichtdeutsch"> Nicht deutsch</label>
                  <label><input type="radio" name="bevoelkerungStatus" value="gesamt"> Gesamt</label>
                </div>
              </div>
            </div>
          </details>
        </div>


        <!-- Auswahlfeld Arbeitslosenquote -->
        <div class="panel-wrap">
          <details class="panel" id="unemploymentPanel">
          <summary class="panel-summary">Arbeitslosenquote</summary>

            <div class="panel-popup">
              <div class="panel-body">
                <div class="field">
                  <label for="unemploymentStichtag">Stichtag:</label>
                  <select id="unemploymentStichtag">
                    <option value="">Datum auswählen</option>
                  </select>
                </div>

                <div class="field hidden" id="statusAuswahlUnemployment">
                  <span>Arbeitslosigkeit:</span>

                  <label><input type="radio" name="unemploymentStatus" value="arbeitslosenanteil"> Gesamt</label>
                  <label><input type="radio" name="unemploymentStatus" value="arbeitslosenanteilMaennlich"> Männlich</label>
                  <label><input type="radio" name="unemploymentStatus" value="arbeitslosenanteilWeiblich"> Weiblich</label>
                  <label><input type="radio" name="unemploymentStatus" value="arbeitslosenanteilDeutsch"> Deutsch</label>
                  <label><input type="radio" name="unemploymentStatus" value="arbeitslosenanteilNichtdeutsch"> Nicht deutsch</label>
                  <label><input type="radio" name="unemploymentStatus" value="jugendarbeitslosigkeitU25"> Unter 25 Jahre</label>
                </div>
              </div>
            </div>
          </details>
        </div>
        <button id="resetPopulationBtn" type="button" class="reset-btn">Füllung der Stadtteile zurücksetzen</button>
      </div>
      

      <div class="route-controls">
        <input id="routeStart" class="search-input" placeholder="Start (Adresse oder 'Mein Standort' eingeben)" />
        <input id="routeEnd" class="search-input" placeholder="Ziel (Adresse/Einrichtung/Arzt oder 'Mein Standort' eingeben)" />
        <button id="routeBtn" type="button">Route berechnen</button>
        <button id="routeClearBtn" type="button">Route löschen</button>
        <label for="routeMode">Verkehrsmittel:</label>
        <select id="routeMode">
          <option value="car">Auto</option>
        </select>
        <div id="routeInfo" class="route-info" hidden></div>
      </div>

     </div>
    </section>


    <div id="loading" class="status" hidden>Lade Daten…</div>
    <div id="error" class="status error" hidden></div>

    <!-- NEU: Layout-Container für Karte + Liste -->
    <div class="layout">
      <!-- NEU: Karte: Links -->
      <div id="map"></div>

      <!-- Rechte Seite: Liste + Empty -->
      <div class="right">
        <ul class="list" id="list"></ul>
        <div id="empty" class="status" hidden>Keine Treffer.</div>
      </div>
    </div>
  

  <!-- Leaflet JS (muss nach dem map-div geladen werden) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Java Script Datei -->
  <script type="module" src="/js/app.js"></script>

</body>
</html>
